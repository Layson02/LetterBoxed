<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LetterBoxed - Catálogo</title>
    <link rel="stylesheet" href="../src/css/style.css">
</head>
<body>
    <header>
        <h1>LetterBoxed</h1>
        <nav>
            <a href="perfil.html">Meu Perfil</a>
            <a href="../index.html">Sair</a>
        </nav>
    </header>

    <main>
        <section class="painel-filtros">
            <input type="text" id="busca-filme" placeholder="Pesquisar título...">
            
            <select id="filtro-genero">
                <option value="">Todos os Gêneros</option>
                <option value="28">Ação</option>
                <option value="35">Comédia</option>
            </select>

            <select id="filtro-ano">
                <option value="">Ano de Lançamento</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>

            <button id="btn-buscar">Buscar</button>
        </section>

        <section id="catalogo-filmes" class="grid-filmes">
            </section>
    </main>

    <script src="./js/app/main.js" type="module" defer></script>
</body>
</html>
